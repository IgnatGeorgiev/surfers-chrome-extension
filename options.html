<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Overlay Options</title>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.2rem; margin-bottom: 24px; }
    .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .add-row input { flex: 1; padding: 6px 10px; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; }
    .add-row button { padding: 6px 14px; cursor: pointer; }
    #error { color: #c00; font-size: 0.85rem; min-height: 1.2em; margin-bottom: 12px; }
    #site-list { list-style: none; padding: 0; margin: 0; }
    #site-list li { display: flex; justify-content: space-between; align-items: center;
                    padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    #site-list li button { background: none; border: none; color: #c00; cursor: pointer; font-size: 1rem; }
    .hint { font-size: 0.8rem; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Subway Surfers Overlay — Site Settings</h1>

  <div class="add-row">
    <input id="pattern-input" type="text" placeholder="*://reddit.com/*" autocomplete="off">
    <button id="add-btn">Add</button>
  </div>
  <div id="error"></div>
  <p class="hint">Supported formats: <code>*://host/*</code>, <code>https://host/*</code>, <code>http://host/*</code></p>

  <ul id="site-list"></ul>

  <script src="options.js"></script>
</body>
</html>
